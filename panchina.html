<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Panchina Rossa – OpenEyes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
 :root {
      --bg-light: #faf7f2;
      --bg-lighter: #ffffff;
      --text-dark: #2f2f2f;
      --text-muted: #7a7a7a;
      --gold: #d4b98a;
      --gold-strong: #c7a873;
      --shadow-soft: 0 12px 35px rgba(0,0,0,0.08);
      --radius: 22px;
}

body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
}

/* HEADER */
header {
      background: #e8dcc7;
      box-shadow: var(--shadow-soft);
      position: sticky;
      top: 0;
      z-index: 10;
}

nav {
      max-width: 1250px;
      margin: auto;
      padding: 18px 26px;
      display: flex;
      justify-content: space-between;
      align-items: center;
}

.nav-links a {
      margin-left: 26px;
      text-decoration: none;
      font-weight: 700;
      color: var(--gold-strong);
      font-size: 1rem;
      position: relative;
      transition: 0.3s;
}

.nav-links a::after {
      content: "";
      width: 0%;
      height: 2px;
      background: var(--gold-strong);
      position: absolute;
      left: 0;
      bottom: -4px;
      transition: 0.3s;
}

.nav-links a:hover::after {
      width: 100%;
}

.social-box {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 700;
      color: var(--gold-strong);
      cursor: pointer;
      transition: 0.3s;
}

.social-box:hover {
      opacity: 0.7;
}

/* HERO */
.hero {
  text-align: center;
  padding: 90px 20px 50px;
}

.hero h2 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  color: var(--gold-strong);
  letter-spacing: 1px;
}

.hero p {
  max-width: 700px;
  margin: 18px auto;
  opacity: 0.85;
  font-size: 1.1rem;
}

/* --- NUOVA SEZIONE GALLERIA (come richiesto) --- */
.gallery-container {
  max-width: 1100px;
  margin: auto;
  background: var(--bg-lighter);
  padding: 40px;
  border-radius: var(--radius);
  box-shadow: var(--shadow-soft);
  display: flex;
  gap: 30px;
  animation: fadeIn 0.6s ease;
}

.vertical-img {
  flex: 1;
}

.vertical-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: var(--radius);
  box-shadow: var(--shadow-soft);
}

.horizontal-box {
  flex: 1.2;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.horizontal-box img {
  width: 100%;
  height: 48%;
  object-fit: cover;
  border-radius: var(--radius);
  box-shadow: var(--shadow-soft);
}

/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<header>
  <nav>
    <div class="logo">
      <img src="immagini/titolo.png" alt="Logo OpenEyes" style="height:65px;">
    </div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="chisiamo.html">Chi siamo</a>
      <a href="PROVA SERVIZI.html">Servizi</a>
      <a href="prodotti.html">Prodotti</a>
      <a href="bilancio.html">Bilancio Sociale</a>
	  <a href="assistenza.html">Assistenza</a>
    </div>

    <div class="social-box">
      <img src="immagini/instagram.png" alt="Instagram" style="width:60px">
      <img src="immagini/tiktok.png" alt="TikTok" style="width:60px">
    </div>
  </nav>
</header>

<section class="hero">
  <h2>Panchina Rossa</h2>
  <p>Un simbolo contro la violenza sulle donne, per ricordare e sensibilizzare la comunità.</p>
</section>

<section class="gallery-container">

  <!-- IMMAGINE VERTICALE -->
  <div class="vertical-img">
    <img src="immagini/foto2.jpg" alt="Immagine verticale">
  </div>

  <!-- DUE IMMAGINI ORIZZONTALI -->
  <div class="horizontal-box">
    <img src="immagini/foto1.jpg" alt="Immagine orizzontale 1">
    <img src="immagini/foto3.jpg" alt="Immagine orizzontale 2">
  </div>

</section>

</body>
</html>
